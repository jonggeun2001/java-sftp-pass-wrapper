name: Build fat JAR on tag

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  build-fat-jar:
    name: Build fat JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Build fat JAR
        run: ./gradlew clean test fatJar

      - name: Prepare artifact name
        id: artifact
        run: |
          tag_name="${GITHUB_REF_NAME//[^A-Za-z0-9._-]/-}"
          echo "name=java-sftp-pass-wrapper-${tag_name}-fatjar" >> "$GITHUB_OUTPUT"

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/libs/*-all.jar
          if-no-files-found: error

      - name: Upload fat JAR to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*-all.jar' | sort | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "No fat JAR found in build/libs" >&2
            exit 1
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "Release $TAG_NAME"
          fi

          gh release upload "$TAG_NAME" "$jar_path" --clobber
