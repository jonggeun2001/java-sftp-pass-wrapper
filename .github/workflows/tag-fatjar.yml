name: Build fat JAR on tag

on:
  push:
    tags:
      - "**"

permissions:
  contents: read

jobs:
  build-fat-jar:
    name: Build fat JAR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Build fat JAR
        run: ./gradlew clean test fatJar

      - name: Prepare artifact name
        id: artifact
        run: |
          tag_name="${GITHUB_REF_NAME//[^A-Za-z0-9._-]/-}"
          echo "name=java-sftp-pass-wrapper-${tag_name}-fatjar" >> "$GITHUB_OUTPUT"

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/libs/*-all.jar
          if-no-files-found: error
